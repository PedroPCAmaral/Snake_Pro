<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Arcade JS - Jogos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 ARCADE JS - 5 JOGOS</h1>

<div class="container">

<div>
    <button onclick="startGame(1)">🎯 Adivinhação</button>
    <button onclick="startGame(2)">✊ Pedra Papel Tesoura</button>
    <button onclick="startGame(3)">📊 Tabuada</button>
    <button onclick="startGame(4)">⭐ Triângulo</button>
    <button onclick="startGame(5)">➕ Soma Série</button>
</div>

<div class="scoreboard">
    <h3>🏆 Pontos: <span id="score">0</span></h3>
    <h3>🔥 Recorde: <span id="record">0</span></h3>
    <h3>🎯 Fase: <span id="level">1</span></h3>
</div>

<div id="gameArea"></div>

</div>

<script src="script.js"></script>
</body>
</html>
